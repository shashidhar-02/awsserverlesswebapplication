<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Serverless Task Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  border-radius: 10px;
  padding: 20px;
}
h1 {
  text-align: center;
}
input {
  width: 75%;
  padding: 10px;
}
button {
  padding: 10px;
  cursor: pointer;
}
.task {
  background: #f1f1f1;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
.logout {
  background: #dc3545;
  color: white;
  border: none;
  float: right;
}
</style>
</head>

<body>
<div class="container">
  <button class="logout" onclick="logout()">Logout</button>
  <h1>📝 Task Tracker</h1>

  <div>
    <input id="taskInput" placeholder="Enter new task"/>
    <button onclick="addTask()">Add Task</button>
  </div>

  <div id="tasks"></div>
</div>

<script>
/* ================= CONFIG ================= */
const COGNITO_DOMAIN = "https://us-east-1wtmddhyns.auth.us-east-1.amazoncognito.com";
const CLIENT_ID = "6bl74m8j3hfb80j6f9q61gp2m7";
const REDIRECT_URI = "https://forntendtask3345.s3.us-east-1.amazonaws.com/index.html";

const GET_API = "https://kflgro3072.execute-api.us-east-1.amazonaws.com/prod/get-tasks";
const POST_API = "https://yfsh5mb20i.execute-api.us-east-1.amazonaws.com/prod/create-task";

/* ================= AUTH ================= */
function getCode() {
  return new URLSearchParams(window.location.search).get("code");
}

async function exchangeCode(code) {
  const body = new URLSearchParams({
    grant_type: "authorization_code",
    client_id: CLIENT_ID,
    code: code,
    redirect_uri: REDIRECT_URI
  });

  const res = await fetch(`${COGNITO_DOMAIN}/oauth2/token`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body.toString()
  });

  const data = await res.json();
  if (data.id_token) {
    localStorage.setItem("jwt", data.id_token);
    window.history.replaceState({}, "", REDIRECT_URI);
  } else {
    alert("Authentication failed");
  }
}

async function ensureLogin() {
  const jwt = localStorage.getItem("jwt");
  const code = getCode();

  if (!jwt && code) await exchangeCode(code);

  if (!localStorage.getItem("jwt")) {
    window.location.href =
      `${COGNITO_DOMAIN}/login?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}`;
  }
}

/* ================= API ================= */
async function loadTasks() {
  const res = await fetch(GET_API, {
    headers: { Authorization: localStorage.getItem("jwt") }
  });
  const data = await res.json();

  const div = document.getElementById("tasks");
  div.innerHTML = "";
  data.forEach(t => {
    const d = document.createElement("div");
    d.className = "task";
    d.textContent = t.task || t.text;
    div.appendChild(d);
  });
}

async function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value.trim()) return alert("Enter task");

  await fetch(POST_API, {
    method: "POST",
    headers: {
      "Authorization": localStorage.getItem("jwt"),
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ task: input.value })
  });

  input.value = "";
  loadTasks();
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("jwt");
  window.location.href = REDIRECT_URI;
}

/* ================= INIT ================= */
window.onload = async () => {
  await ensureLogin();
  loadTasks();
};
</script>
</body>
</html>
